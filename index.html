<!DOCTYPE html>
<html>
<head>
<title>MINIMALIST SHOE PAGE</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

/* Body with overlay */
body{
    font-family: Arial;
    height: 100vh;
    background:
	linear-gradient(rgba(0,0,0,0.4),rgba(0,0,0,0.4)),
        url("https://thumbs.dreamstime.com/b/sneaker-3247828.jpg?w=768");
    background-size: cover;
    background-position: center;
    color: white;
}

/* ===== HEADER (SAME AS OTHER PAGES) ===== */
header {
    text-align: center;
    padding: 40px;
    background: transparent;
    border-bottom:none;
}

header h1 {
    margin: 0;
    font-weight: 500;
}

/* NAVBAR */
nav {
    margin-top: 20px;
}

nav a {
    color: white;
    text-decoration: none;
    margin: 0 25px;
    font-weight: 500;
}

/* Active link */
nav a.active {
    font-weight: bold;
    border-bottom: 2px solid white;
}

/* Hero Section */
.hero{
    margin-top: 150px;
    margin-left: 60px;
    width: 500px;
}

.hero h2{
    font-size: 42px;
}

.hero p{
    margin-top: 15px;
    line-height: 1.6;
}

/* Button */
.btn{
    display: inline-block;
    margin-top: 20px;
    padding: 12px 25px;
    background: white;
    color: black
    text-decoration: none;
    border-radius: 5px;
}

/* Footer */
footer{
    background: rgba(0,0,0,0.7);
    color: white;
    text-align: center;
    padding: 10px;
    position: absolute;
    bottom: 0;
    width: 100%;
}

</style>

</head>

<body>

<!-- ===== NEW HEADER ===== -->
<header>
    
</header>

<div class="hero">
<h2>WELCOME TO MY COLLECTION</h2>

<p>
Amidst all the beautiful things in the world,
shoes are the most basic necessity.
Come along with me, explore and buy your favourite.
</p>

<a href="shoeblog.html" class="btn">WELCOME →</a>
</div>

<footer>
<p>© 2026 Minimal Shoe Blog | Designed by Thanmay</p>
</footer>

</body>
</html>
